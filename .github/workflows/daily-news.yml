name: Daily AI News Push

on:
  schedule:
    # 每天北京时间 22:00 (UTC+8 → UTC 14:00)
    - cron: "0 14 * * *"
  workflow_dispatch:  # allow manual trigger

jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run news push
        env:
          QQ_EMAIL: ${{ secrets.QQ_EMAIL }}
          QQ_SMTP_CODE: ${{ secrets.QQ_SMTP_CODE }}
          RECIPIENT: ${{ secrets.QQ_EMAIL }}
        run: python main.py
